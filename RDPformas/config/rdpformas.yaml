rdpvisao_node:
  ros__parameters:

    # ---- Câmera ----
    image_topic: '/vertical_camera/compressed'
    processing_frequency: 10.0    # Hz; deve coincidir com publish_rate do webcam_publisher

    # ---- Debug ----
    debug_image: false
    debug_mask: false
    debug_publish_rate: 2.0       # Hz (equivalente ao antigo debug_pub_interval=0.5s)
    debug_max_width: 640
    debug_jpeg_quality: 60
